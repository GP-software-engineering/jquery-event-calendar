<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery Event Calendar - Demo</title>
    
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-color: #333;
            --header-bg: #fff;
            --header-border: #eee;
            --card-bg: #fff;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
            --select-border: #ccc;
            --toolbar-bg: rgba(255, 255, 255, 0.95);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1c1d;
                --text-color: #e4e6eb;
                --header-bg: #242526;
                --header-border: #333;
                --card-bg: #242526;
                --card-shadow: 0 4px 15px rgba(0,0,0,0.15);
                --select-border: #555;
                --toolbar-bg: rgba(36, 37, 38, 0.95);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--header-bg);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--header-border);
        }

        h1, h2 { margin: 0; padding: 0; }
        h1 { font-size: 24px; color: var(--text-color); }
        h2 { font-size: 16px; color: #666; font-weight: normal; margin-top: 5px; }

        .toolbar {
            position: sticky;
            top: 0;
            background-color: var(--toolbar-bg);
            border-bottom: 1px solid var(--header-border);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .lang-switcher, .theme-switcher {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        select {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--select-border);
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 14px;
            cursor: pointer;
        }

        .theme-switcher button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-color);
            padding: 5px;
            border-radius: 50%;
            transition: background 0.2s;
        }
        
        .theme-switcher button:hover {
            background-color: rgba(128,128,128, 0.1);
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px;
        }

        .demo-content {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            padding: 30px;
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #single-calendar {
            border: none; /* Let the demo content container handle the border/shadow */
        }
    </style>
    
    <link rel="stylesheet" href="../dist/css/eventCalendar.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header>
        <h1>jQuery Event Calendar</h1>
        <h2>Demo</h2>
    </header>

    <div class="toolbar">
        <div class="lang-switcher">
            <label for="lang-switcher">Language:</label>
            <select id="lang-switcher">
                <option value="en" selected>English</option>
                <option value="it-IT">Italiano</option>
                <option value="es-ES">Español</option>
                <option value="fr-FR">Français</option>
                <option value="de-DE">Deutsch</option>
                <option value="pt-PT">Português</option>
                <option value="zh-CN">简体中文</option>
            </select>
        </div>
        
        <div class="theme-switcher">
            <button id="theme-light"><i class="fa-solid fa-sun"></i></button>
            <button id="theme-dark"><i class="fa-solid fa-moon"></i></button>
        </div>
    </div>

    <main>
        <div class="demo-content">
            <div id="single-calendar"></div>
        </div>
    </main>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    
    <script src="../dist/umd/jquery.eventCalendar.js"></script>

    <script>
        // Sample events data
        const mainEvents = [
            {
                date: moment().format('YYYY-MM-DD'),
                title: 'Riunione Team',
                description: 'Discussione sull\'architettura della nuova release. (TS & CSS updates)'
            },
            {
                date: moment().add(1, 'days').format('YYYY-MM-DD'),
                title: 'Compleanno Marco',
                description: 'Tutto il giorno. Ricordarsi il regalo!',
                isLocked: true
            },
            {
                date: moment().add(2, 'days').format('YYYY-MM-DD'),
                title: 'Rilascio v2.0.4 - Localizzazioni',
                description: 'Rilascio ufficiale su NPM delle nuove lingue.',
                url: 'https://www.gpsoftware.it/projects/jquery-event-calendar/',
                target: '_blank'
            }
        ];

        // 1. Theme switching logic
        $('#theme-light').on('click', () => {
            document.documentElement.style.setProperty('--bg-color', '#f4f7f6');
            document.documentElement.style.setProperty('--text-color', '#333');
            document.documentElement.style.setProperty('--header-bg', '#fff');
            document.documentElement.style.setProperty('--toolbar-bg', 'rgba(255, 255, 255, 0.95)');
        });

        $('#theme-dark').on('click', () => {
            document.documentElement.style.setProperty('--bg-color', '#1a1c1d');
            document.documentElement.style.setProperty('--text-color', '#e4e6eb');
            document.documentElement.style.setProperty('--header-bg', '#242526');
            document.documentElement.style.setProperty('--toolbar-bg', 'rgba(36, 37, 38, 0.95)');
        });

        // 2. Initial Plugin Call (English default)
        $(document).ready(function() {
            $('#single-calendar').eventCalendar({
                jsonData: mainEvents,
                showDescription: true,
                startWeekOnMonday: true,
                localeKey: 'en',
                eventsScrollable: true
            });
        });

        // 3. I18N Dynamic Switcher Logic
        $('#lang-switcher').on('change', function() {
            const locale = $(this).val();

            // Destroy existing instances to prevent duplicates
            $('#single-calendar').empty().removeData('plugin_eventCalendar');

            if (locale === 'en') {
                // Fallback to default English
                $('#single-calendar').eventCalendar({
                    jsonData: mainEvents,
                    showDescription: true,
                    localeKey: 'en',
                    startWeekOnMonday: true,
                    eventsScrollable: true
                });
                return;
            }

            // Load the localized script dynamically from dist/locales
            $.getScript(`../dist/locales/${locale}.js`, function() {
                // Access the specific locale key inside the global window object
                const localizedConfig = window.eventCalendar_i18n[locale];
                
                if (!localizedConfig) {
                    console.error(`Locale configuration not found for ${locale}`);
                    return;
                }

                $('#single-calendar').eventCalendar({
                    jsonData: mainEvents,
                    localeKey: locale,
                    i18n: localizedConfig,
                    showDescription: true,
                    startWeekOnMonday: true,
                    eventsScrollable: true
                });
            }).fail(function() {
                console.error(`Error loading locale script: ../dist/locales/${locale}.js`);
            });
        });
    </script>
</body>
</html>
